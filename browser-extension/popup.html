<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 16px; font-family: sans-serif; }
    h2 { margin-top: 0; font-size: 18px; color: #a855f7; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; margin-bottom: 4px; color: #666; }
    input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; background: #a855f7; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #9333ea; }
    .msg { margin-top: 8px; font-size: 12px; color: green; display: none; }
  </style>
</head>
<body>
  <h2>Sparkit Settings</h2>
  <div class="form-group">
    <label>API Access Token</label>
    <input type="text" id="token" placeholder="Paste your Bearer token here" />
  </div>
  <button id="save">Save Settings</button>
  <div id="msg" class="msg">Saved!</div>
  <script src="popup.js"></script>
</body>
</html>
